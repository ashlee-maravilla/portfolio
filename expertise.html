<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Ashlee Maravilla's areas of expertise — electrical infrastructure, mechanical systems, hardware planning, building automation, project management, budget governance, safety, and people & communication.">
<title>Expertise — Ashlee Maravilla</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #01002e;
    --ink-mid: #5a5147;
    --ink-light: #8a7f72;
    --ruby: #9b1b30;
    --ruby-faint: rgba(155,27,48,0.05);
    --ruby-border: rgba(155,27,48,0.2);
    --ruby-rule: rgba(155,27,48,0.1);
    --sapphire: #1a4bdb;
    --sapphire-bg: #eef2ff;
    --emerald: #0a7c4e;
    --emerald-bg: #edfaf3;
    --emerald-hover: #c8f0dc;
    --page: #f5f0e8;
    --page-alt: #ece5d8;
    --rule: #d9d2c5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    font-size: 18px;
    background: var(--page);
    background-image:
      linear-gradient(var(--ruby-rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--ruby-rule) 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--ink);
    min-height: 100vh;
  }

  .page-container {
    max-width: 980px;
    margin: 0 auto;
    background: var(--page);
    min-height: 100vh;
  }

  /* ── NAV ── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 52px;
    border-bottom: 1px solid var(--ruby-rule);
    background: var(--page);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-logo {
    font-family: var(--mono); font-size: 20px; font-weight: 600;
    color: var(--ruby); letter-spacing: 1px; text-decoration: none;
  }
  .nav-logo span { color: rgba(155,27,48,0.35); }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a {
    font-family: var(--mono); font-size: 14px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--ink-light); text-decoration: none;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: var(--ruby); }
  .nav-links a.active { color: var(--ruby); border-bottom: 1.5px solid var(--ruby); padding-bottom: 2px; }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 52px 52px 44px;
    background: var(--page-alt);
    border-bottom: 1px solid var(--rule);
    position: relative; overflow: hidden;
  }
  .header-deco {
    position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
    font-size: 42px; opacity: 0.5; letter-spacing: 8px;
    pointer-events: none; user-select: none;
  }
  .page-eyebrow {
    font-family: var(--mono); font-size: 14px; letter-spacing: 4px;
    text-transform: uppercase; color: var(--ruby); margin-bottom: 14px; opacity: 0.85;
  }
  .page-eyebrow::before { content: '— '; }
  .page-title {
    font-family: var(--sans); font-size: 56px; font-weight: 700;
    letter-spacing: -1.5px; line-height: 1; color: var(--ink);
  }
  .bracket-tr {
    position: absolute; top: 28px; right: 52px;
    width: 60px; height: 60px;
    border-top: 1.5px solid var(--ruby-border);
    border-right: 1.5px solid var(--ruby-border);
    pointer-events: none;
  }

  /* ── TAB LAYOUT ── */
  .tab-layout {
    display: grid;
    grid-template-columns: 160px 1fr;
    min-height: 600px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--rule);
    background: var(--page-alt);
    display: flex; flex-direction: column;
  }
  .tab-btn {
    padding: 16px 20px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px;
    background: transparent; border: none;
    border-bottom: 1px solid rgba(155,27,48,0.08);
    cursor: pointer; color: var(--ink-light);
    transition: all 0.12s; text-align: left;
    line-height: 1.4; display: flex; align-items: center; gap: 10px;
  }
  .tab-btn:hover { background: var(--page); color: var(--ink); }
  .tab-btn.active {
    background: var(--page); color: var(--ruby);
    font-weight: 600;
    border-left: 3px solid var(--ruby);
    padding-left: 17px;
  }
  .tab-icon { font-size: 16px; flex-shrink: 0; }

  /* ── CONTENT ── */
  .content { padding: 40px 44px; overflow: auto; }

  .disc-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 32px; padding-bottom: 28px;
    border-bottom: 1px solid var(--rule);
  }
  .disc-icon-box {
    width: 60px; height: 60px; flex-shrink: 0;
    background: var(--ruby-faint);
    border: 1px solid var(--ruby-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .disc-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .disc-subtitle { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; color: var(--ink-light); text-transform: uppercase; }

  .disc-body { display: grid; grid-template-columns: 1fr 220px; gap: 36px; }

  .section-heading {
    font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--ruby); margin-bottom: 14px;
    opacity: 0.7; display: flex; align-items: center; gap: 10px;
  }
  .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--ruby-border); }

  .disc-description {
    font-size: 14px; line-height: 1.8; color: var(--ink-mid); margin-bottom: 32px;
  }

  .pills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px; }
  .pill {
    padding: 5px 12px; font-family: var(--mono); font-size: 11px;
    font-weight: 500; border: 1.5px solid; letter-spacing: 0.3px;
  }
  .pill-ruby { color: var(--ruby); border-color: var(--ruby-border); background: var(--ruby-faint); }
  .pill-sapphire { color: var(--sapphire); border-color: rgba(26,75,219,0.3); background: var(--sapphire-bg); }

  .project-ref {
    border: 1px dashed var(--emerald);
    background: var(--emerald-bg);
    padding: 12px 14px; margin-bottom: 8px;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    text-decoration: none; transition: background 0.12s;
  }
  .project-ref:hover { background: var(--emerald-hover); }
  .project-ref-icon { font-size: 16px; flex-shrink: 0; }
  .project-ref-title { font-size: 13px; font-weight: 600; color: var(--emerald); flex: 1; }
  .project-ref-arrow { font-size: 12px; color: var(--emerald); }
</style>
</head>
<body>
<div class="page-container">

  <nav class="nav">
    <a href="index.html" class="nav-logo">AM<span>/</span></a>
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="expertise.html" class="active">Expertise</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <div class="header-deco">🧠</div>
    <div class="page-eyebrow">Capabilities</div>
    <div class="page-title">Areas of Expertise</div>
  </div>

  <div class="tab-layout">
    <div class="sidebar" id="tabBar">
      <button class="tab-btn active" onclick="showTab(0)"><span class="tab-icon">⚡</span>Electrical<br>Infrastructure</button>
      <button class="tab-btn" onclick="showTab(1)"><span class="tab-icon">🌡️</span>Mechanical<br>Infrastructure</button>
      <button class="tab-btn" onclick="showTab(2)"><span class="tab-icon">🖥️</span>Hardware<br>Planning</button>
      <button class="tab-btn" onclick="showTab(3)"><span class="tab-icon">🤖</span>Building<br>Automation</button>
      <button class="tab-btn" onclick="showTab(4)"><span class="tab-icon">📋</span>Project<br>Management</button>
      <button class="tab-btn" onclick="showTab(5)"><span class="tab-icon">💰</span>Budget<br>Governance</button>
      <button class="tab-btn" onclick="showTab(6)"><span class="tab-icon">🔒</span>Safety &amp;<br>Security</button>
      <button class="tab-btn" onclick="showTab(7)"><span class="tab-icon">🤝</span>People &amp;<br>Communication</button>
    </div>
    <div class="content" id="contentArea"></div>
  </div>

</div>

<script>
const DISCIPLINES = [
  {
    icon: "⚡", title: "Electrical Infrastructure",
    subtitle: "Power systems · distribution · resilience",
    description: "In-depth knowledge of the full power chain in mission-critical data center environments — from utility entry through to rack-level distribution. Hands-on experience with equipment manipulation, commissioning, and real-time power management.",
    skills: ["Medium Voltage Switchgear","UPS Systems","Batteries","Static Transfer Switches (STS)","Power Distribution Units (PDU)","Remote Power Panels (RPP)","Automatic Transfer Switches (ATS)","Generators","Power Monitoring","Battery Monitoring"],
    tools: ["APC StruxureWare","Cellwatch","WebCTRL","SE Power Commission","Commissioning","MOP Writing","Preventative Maintenance","Bill Analysis"],
    projects: [{ icon: "⚡", title: "UPS Infrastructure Upgrade" }]
  },
  {
    icon: "🌡️", title: "Mechanical Infrastructure",
    subtitle: "Cooling · HVAC · thermal systems",
    description: "Experience overseeing mechanical systems that maintain optimal operating conditions in data center environments, including cooling redundancy planning and equipment replacement.",
    skills: ["HVAC","Chilled Water Systems","Chillers","Cooling Towers","Pumps","CRAH Units","Fan Coil Units","Exhaust Fans","Duct Heaters"],
    tools: ["Thermal Management","Cooling Redundancy","WebCTRL"],
    projects: [{ icon: "⚡", title: "UPS Infrastructure Upgrade" }]
  },
  {
    icon: "🖥️", title: "Hardware Planning",
    subtitle: "Capacity planning · white space management",
    description: "Coordinating cable and rack installation, ensuring power and cooling capacity aligns with compute demand. Experience working with cross-functional teams on refresh cycles and capacity forecasting.",
    skills: ["STS","PDU","RPP","ATS","Wye-boxes","IT Racks","Power Cables","Fiber Optic Cables","CAT6 Cables"],
    tools: ["Capacity Planning","Rack & Stack","Asset Tracking","Procurement Coordination","Vendor Management","ServiceNow SMC","AutoCAD","MS Excel","MS SharePoint","MS InfoPath","MS Access","OBTAIN","Coupa"],
    projects: [
      { icon: "🌐", title: "ISP Fiber Infrastructure Refresh" },
      { icon: "🖥️", title: "IBM Mainframe Refresh" }
    ]
  },
  {
    icon: "🤖", title: "Building Automation",
    subtitle: "BMS · controls · monitoring",
    description: "Familiarity with Building Management Systems that monitor and control mechanical and electrical infrastructure, enabling proactive fault detection and operational efficiency across data center facilities.",
    skills: ["BMS / BAS","SCADA","HMI","OIP","Automated Logic Controls (ALC)","Relays","Current Transformers (CT)","Potential Transformers (PT)","Differential Pressure Sensors","Temp/Humidity Sensors"],
    tools: ["BACnet","Modbus","TCP/IP","PUE Tracking","Environmental Monitoring","Alarm Management","Controls Integration","MS Project"],
    projects: [{ icon: "⚡", title: "UPS Infrastructure Upgrade" }]
  },
  {
    icon: "📋", title: "Project Management",
    subtitle: "Multi-phase delivery · stakeholder coordination",
    description: "Led multi-phase, multi-disciplinary infrastructure programs from design through construction and commissioning. Skilled at maintaining schedule, managing risk, and communicating across technical and business stakeholders.",
    skills: [],
    tools: ["MS Project","MS Word","MS Excel","MS PowerPoint","CMiC","CX Alloy","Trello (Agile, Kanban)","Waterfall","Hybrid","Program Scheduling","Risk Management","RFI / Submittal Tracking","Stakeholder Reporting","Punch List Management","Bidding","Contracting"],
    projects: [
      { icon: "⚡", title: "UPS Infrastructure Upgrade" },
      { icon: "🌐", title: "ISP Fiber Infrastructure Refresh" },
      { icon: "📹", title: "Security Infrastructure Modernization" }
    ]
  },
  {
    icon: "💰", title: "Budget Governance",
    subtitle: "Cost tracking · forecasting · reporting",
    description: "Managed program budgets totaling $15M+, including tracking actuals against forecasts, processing change orders, and reporting financial status to leadership. Experience with cost control across construction and equipment procurement. Prepared monthly requisitions for department funding based on server installations, decommissions, and material restocking.",
    skills: [],
    tools: ["MS Excel","Budget Tracking","Change Order Management","Cost Forecasting","Vendor Invoicing","CapEx Reporting","Financial Dashboards"],
    projects: [
      { icon: "⚡", title: "UPS Infrastructure Upgrade" },
      { icon: "📹", title: "Security Infrastructure Modernization" }
    ]
  },
  {
    icon: "🔒", title: "Safety & Security",
    subtitle: "Physical security · compliance · safe work practices",
    description: "Experience managing physical security infrastructure modernization and ensuring safe work practices in live data center environments, including coordination of hot-work permits, lockout/tagout procedures, and contractor safety.",
    skills: ["LOTO / Lockout Tagout","Hot Work Permits","Physical Access Control","CCTV / Camera Systems"],
    tools: ["Genetec System","IP Installer","Camera Programming","Safety Audits","MOP Writing","Execution Plan Review","Schematic Review","ServiceNow SMC","Access Requests","Contractor Management"],
    projects: [
      { icon: "📹", title: "Security Infrastructure Modernization" },
      { icon: "⚡", title: "UPS Infrastructure Upgrade" },
      { icon: "🌐", title: "ISP Fiber Infrastructure Refresh" }
    ]
  },
  {
    icon: "🤝", title: "People & Communication",
    subtitle: "Cross-functional leadership · stakeholder engagement",
    description: "Experienced at translating complex technical concepts for non-technical audiences and aligning diverse teams — from union trades to C-suite stakeholders — around a shared project vision. Strong written and verbal communicator. Trained new-hires on the site's fundamental electrical and mechanical infrastructure as well as advanced level electrical training.",
    skills: [],
    tools: ["MS Teams","MS PowerPoint","MS SharePoint","MS InfoPath","Executive Reporting","Technical Writing","Cross-functional Coordination","Contractor Oversight","Team Briefings","Meeting Facilitation","Data Analysis","Data Visualization","Subject Matter Expert","Teaching","Escalation Contact"],
    projects: [
      { icon: "⚡", title: "UPS Infrastructure Upgrade" },
      { icon: "🌐", title: "ISP Fiber Infrastructure Refresh" },
      { icon: "📹", title: "Security Infrastructure Modernization" }
    ]
  }
];

let currentTab = parseInt(localStorage.getItem('exp_tab') || '0');

function showTab(idx) {
  currentTab = idx;
  localStorage.setItem('exp_tab', idx);
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  renderContent();
}

function renderContent() {
  const d = DISCIPLINES[currentTab];

  const projectsHTML = `
    <div class="section-heading">Related Projects</div>
    ${d.projects.length ? d.projects.map(p => `
      <a class="project-ref" href="projects.html">
        <span class="project-ref-icon">${p.icon}</span>
        <span class="project-ref-title">${p.title}</span>
        <span class="project-ref-arrow">→</span>
      </a>`).join('') : `<div style="font-size:13px;color:var(--ink-light);padding:8px 0;">No projects linked yet.</div>`}
  `;

  document.getElementById('contentArea').innerHTML = `
    <div class="disc-header">
      <div class="disc-icon-box">${d.icon}</div>
      <div>
        <div class="disc-title">${d.title}</div>
        <div class="disc-subtitle">${d.subtitle}</div>
      </div>
    </div>
    <div class="disc-body">
      <div>
        <div class="section-heading">About this discipline</div>
        <div class="disc-description">${d.description}</div>
        ${d.skills.length ? `
          <div class="section-heading">Equipment</div>
          <div class="pills-list">${d.skills.map(s => `<span class="pill pill-ruby">${s}</span>`).join('')}</div>
        ` : ''}
        ${d.tools.length ? `
          <div class="section-heading">Programs &amp; Skills</div>
          <div class="pills-list">${d.tools.map(s => `<span class="pill pill-sapphire">${s}</span>`).join('')}</div>
        ` : ''}
      </div>
      <div>
        ${projectsHTML}
      </div>
    </div>
  `;
}

window.addEventListener('load', () => showTab(currentTab));

window.addEventListener('scroll', () => localStorage.setItem('exp_scroll', window.scrollY));
window.addEventListener('load', () => {
  const s = localStorage.getItem('exp_scroll');
  if (s) setTimeout(() => window.scrollTo(0, parseInt(s)), 50);
});
</script>
</body>
</html>
